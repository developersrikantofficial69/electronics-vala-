<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calendar — ELECTRONICS VALA</title>
  <meta name="description" content="Visual task calendar — see all deadlines and content schedules by month." />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/css/main.css" />

</head>
<body>
  <div class="page-loader" id="page-loader"><div class="loader-logo" style="width:48px;height:48px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border-radius:12px;display:flex;align-items:center;justify-content:center"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:26px;height:26px"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg></div><div class="spinner"></div></div>

  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <header class="app-header" id="app-header"></header>
    <main class="main-content">
      <div class="page-header">
        <div><h1 class="page-title">Content Calendar</h1><p class="page-subtitle">Visual deadline and schedule view for all tasks</p></div>
        <div style="display:flex;gap:0.5rem;flex-wrap:wrap">
          <div style="display:flex;align-items:center;gap:0.35rem;font-size:0.72rem;color:var(--text-muted)">
            <div style="width:8px;height:8px;border-radius:2px;background:var(--prio-high)"></div> Overdue
            <div style="width:8px;height:8px;border-radius:2px;background:var(--prio-medium);margin-left:0.35rem"></div> Due Soon
            <div style="width:8px;height:8px;border-radius:2px;background:var(--status-completed);margin-left:0.35rem"></div> Completed
            <div style="width:8px;height:8px;border-radius:2px;background:var(--status-progress);margin-left:0.35rem"></div> In Progress
          </div>
        </div>
      </div>

      <!-- Filters: Today (all roles) + User filter (admin only) -->
      <div class="filters-bar" style="display:flex">
        <div id="user-filter-wrapper" style="display:none">
          <select class="filter-select" id="filter-calendar-user">
            <option value="all">All Team Members</option>
          </select>
        </div>
        <button class="btn btn-secondary btn-sm" id="today-btn">📅 Today</button>
      </div>

      <div class="card">
        <div id="calendar-container">
          <div style="text-align:center;padding:3rem"><div class="spinner"></div><p style="margin-top:1rem;color:var(--text-muted);font-size:0.82rem">Loading calendar…</p></div>
        </div>
      </div>

      <!-- Sidebar: upcoming this month -->
      <div class="card" style="margin-top:1.25rem">
        <div class="card-header"><div class="card-title">📋 Upcoming This Month</div></div>
        <div id="month-tasks-list"><div style="text-align:center;padding:1.5rem"><div class="spinner"></div></div></div>
      </div>
    </main>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <script src="../assets/js/firebase-config.js"></script>
  <script src="../assets/js/ui.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/tasks.js"></script>
  <script src="../assets/js/notifications.js"></script>
  <script src="../assets/js/calendar.js"></script>

  <script>
    let profile = null, allTasks = [];

    async function init() {
      profile = await requireAuthCalendar();
      const role = profile.role;

      // Build sidebar based on actual role
      document.getElementById('sidebar').innerHTML = buildSidebar(role, 'calendar');
      document.getElementById('app-header').innerHTML = buildHeader('Calendar');
      initDropdowns(); initMobileSidebar();
      populateUserUI(profile);
      NotifService.listen(profile.uid, n => NotifService.renderDropdown(profile.uid, n));

      if (role === 'admin') {
        document.getElementById('user-filter-wrapper').style.display = 'block';
        // Load all users for filter
        const usersSnap = await db.collection(COLLECTIONS.USERS).get();
        const sel = document.getElementById('filter-calendar-user');
        usersSnap.docs.forEach(d => {
          const u = d.data();
          sel.innerHTML += `<option value="${d.id}">${u.name || u.email.split('@')[0]}</option>`;
        });
        sel.addEventListener('change', () => loadAndRender(sel.value === 'all' ? null : sel.value));
      }

      document.getElementById('today-btn')?.addEventListener('click', () => {
        Calendar.currentDate = new Date();
        Calendar.render(allTasks);
        renderMonthList(allTasks);
      });

      loadAndRender(role === 'user' ? profile.uid : null);
    }

    async function loadAndRender(uid = null) {
      allTasks = uid ? await TasksService.getForUser(uid) : await TasksService.getAll();
      Calendar.render(allTasks);
      renderMonthList(allTasks);
    }

    function renderMonthList(tasks) {
      const now = new Date();
      const currentMonth = now.getMonth();
      const currentYear  = now.getFullYear();
      const monthTasks = tasks
        .filter(t => {
          if (!t.deadline) return false;
          const d = t.deadline.toDate ? t.deadline.toDate() : new Date(t.deadline);
          return d.getMonth() === currentMonth && d.getFullYear() === currentYear;
        })
        .filter(t => t.status !== TASK_STATUS.COMPLETED)
        .sort((a,b) => {
          const da = a.deadline.toDate ? a.deadline.toDate() : new Date(a.deadline);
          const db_ = b.deadline.toDate ? b.deadline.toDate() : new Date(b.deadline);
          return da - db_;
        });

      const el = document.getElementById('month-tasks-list');
      if (!monthTasks.length) { el.innerHTML = `<div class="empty-state" style="padding:1.5rem"><p>No pending tasks with deadlines this month 🎉</p></div>`; return; }
      el.innerHTML = `
        <div class="table-wrapper">
          <table class="table">
            <thead><tr><th>Task</th><th>Assigned To</th><th>Deadline</th><th>Status</th></tr></thead>
            <tbody>
              ${monthTasks.map(t => `
                <tr>
                  <td class="td-primary">${truncate(t.title,40)}</td>
                  <td style="font-size:0.8rem">${t.assignedToName||'—'}</td>
                  <td>${formatDate(t.deadline)} ${deadlineBadge(t.deadline)}</td>
                  <td>${statusBadge(t.status)}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      `;
    }

    // auth without role restriction (both admin and user can access calendar)
    async function requireAuthCalendar() {
      return new Promise((resolve) => {
        Loader.show('Loading calendar…');
        const unsub = auth.onAuthStateChanged(async user => {
          unsub();
          if (!user) { Loader.hide(); window.location.href = '../index.html'; return; }
          try {
            const profile = await ensureUserDoc(user);
            Loader.hide();
            resolve(profile);
          } catch(e) {
            Loader.hide();
            const role = getRoleFromEmail(user.email);
            resolve({ uid: user.uid, email: user.email, role, name: user.email.split('@')[0] });
          }
        });
      });
    }

    init();
  </script>
</body>
</html>
