<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task Management — ELECTRONICS VALA</title>
  <meta name="description" content="Admin task management — create, assign, filter, approve and reject team tasks." />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/css/main.css" />

</head>
<body>
  <div class="page-loader" id="page-loader">
    <div class="loader-logo" style="width:48px;height:48px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border-radius:12px;display:flex;align-items:center;justify-content:center">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:26px;height:26px"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>
    </div>
    <div class="spinner"></div>
  </div>

  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <header class="app-header" id="app-header"></header>
    <main class="main-content">
      <div class="page-header">
        <div>
          <h1 class="page-title">Task Management</h1>
          <p class="page-subtitle">Create, assign, and track all team tasks</p>
        </div>
        <button class="btn btn-primary" id="create-task-btn">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:15px;height:15px"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          New Task
        </button>
      </div>

      <!-- Filters -->
      <div class="filters-bar">
        <input type="text" id="task-search" class="form-control" style="width:220px" placeholder="🔍 Search tasks…" />
        <select class="filter-select" id="filter-status">
          <option value="all">All Status</option>
          <option value="pending">Pending</option>
          <option value="in_progress">In Progress</option>
          <option value="submitted">Submitted</option>
          <option value="under_review">Under Review</option>
          <option value="completed">Completed</option>
        </select>
        <select class="filter-select" id="filter-priority">
          <option value="all">All Priority</option>
          <option value="high">High</option>
          <option value="medium">Medium</option>
          <option value="low">Low</option>
        </select>
        <select class="filter-select" id="filter-user">
          <option value="all">All Members</option>
        </select>
        <button class="btn btn-secondary btn-sm" id="clear-filters">Clear</button>
      </div>

      <!-- Task Table -->
      <div class="card">
        <div id="tasks-table-container">
          <div style="text-align:center;padding:3rem"><div class="spinner"></div><p style="margin-top:1rem;color:var(--text-muted);font-size:0.82rem">Loading tasks…</p></div>
        </div>
      </div>
    </main>
  </div>

  <!-- CREATE / EDIT TASK MODAL -->
  <div class="modal-overlay" id="task-modal">
    <div class="modal modal-lg">
      <div class="modal-header">
        <h2 class="modal-title" id="modal-title">Create New Task</h2>
        <button class="modal-close" onclick="Modal.close('task-modal')">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:18px;height:18px"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="form-grid">
        <div class="form-group form-full">
          <label class="form-label">Task Title *</label>
          <input type="text" id="task-title" class="form-control" placeholder="e.g. Write script for Product Review video" maxlength="100" required />
        </div>
        <div class="form-group form-full">
          <label class="form-label">Description</label>
          <textarea id="task-desc" class="form-control" rows="3" placeholder="Detailed task description, requirements, references…"></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">Assign To *</label>
          <select id="task-assign" class="form-control">
            <option value="">Select team member…</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Deadline *</label>
          <input type="date" id="task-deadline" class="form-control" />
        </div>
        <div class="form-group">
          <label class="form-label">Priority</label>
          <select id="task-priority" class="form-control">
            <option value="medium">Medium</option>
            <option value="high">High</option>
            <option value="low">Low</option>
          </select>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="Modal.close('task-modal')">Cancel</button>
        <button class="btn btn-primary" id="save-task-btn">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px"><polyline points="20 6 9 17 4 12"/></svg>
          Create Task
        </button>
      </div>
    </div>
  </div>

  <!-- TASK DETAIL MODAL -->
  <div class="modal-overlay" id="task-detail-modal">
    <div class="modal modal-lg" id="task-detail-content"></div>
  </div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <script src="../assets/js/firebase-config.js"></script>
  <script src="../assets/js/ui.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/tasks.js"></script>
  <script src="../assets/js/notifications.js"></script>

  <script>
    let currentProfile = null;
    let allTasks = [];
    let allUsers = [];
    let editingTaskId = null;
    let tasksUnsub = null;

    async function init() {
      currentProfile = await requireAuth('admin');
      document.getElementById('sidebar').innerHTML = buildSidebar('admin', 'tasks');
      document.getElementById('app-header').innerHTML = buildHeader('Task Management');
      initDropdowns(); initMobileSidebar();
      populateUserUI(currentProfile);
      NotifService.listen(currentProfile.uid, notifs => NotifService.renderDropdown(currentProfile.uid, notifs));

      await loadUsers();
      subscribeToTasks();
      setupFilters();

      document.getElementById('create-task-btn').addEventListener('click', openCreateModal);
      document.getElementById('save-task-btn').addEventListener('click', saveTask);

      // Pre-filter if URL param
      const params = new URLSearchParams(window.location.search);
      if (params.get('filter')) {
        document.getElementById('filter-status').value = params.get('filter');
      }
      if (params.get('uid')) {
        document.getElementById('filter-user').value = params.get('uid');
      }
      if (params.get('filter') || params.get('uid')) {
        applyFiltersAndRender();
      }
    }

    async function loadUsers() {
      const snap = await db.collection(COLLECTIONS.USERS).get();
      allUsers = snap.docs.map(d => ({ uid: d.id, ...d.data() })).filter(u => u.role !== 'admin');

      const assignSel = document.getElementById('task-assign');
      const userFilter = document.getElementById('filter-user');
      allUsers.forEach(u => {
        assignSel.innerHTML += `<option value="${u.uid}" data-name="${u.name||u.email}">${u.name || u.email.split('@')[0]}</option>`;
        userFilter.innerHTML += `<option value="${u.uid}">${u.name || u.email.split('@')[0]}</option>`;
      });
    }

    function subscribeToTasks() {
      if (tasksUnsub) tasksUnsub();
      tasksUnsub = TasksService.onAll(tasks => {
        allTasks = tasks;
        applyFiltersAndRender();
      });
    }

    function setupFilters() {
      ['task-search','filter-status','filter-priority','filter-user'].forEach(id => {
        document.getElementById(id)?.addEventListener('input', debounce(applyFiltersAndRender, 200));
        document.getElementById(id)?.addEventListener('change', applyFiltersAndRender);
      });
      document.getElementById('clear-filters')?.addEventListener('click', () => {
        document.getElementById('task-search').value = '';
        document.getElementById('filter-status').value = 'all';
        document.getElementById('filter-priority').value = 'all';
        document.getElementById('filter-user').value = 'all';
        applyFiltersAndRender();
      });
    }

    function applyFiltersAndRender() {
      const query    = document.getElementById('task-search')?.value || '';
      const status   = document.getElementById('filter-status')?.value || 'all';
      const priority = document.getElementById('filter-priority')?.value || 'all';
      const uid      = document.getElementById('filter-user')?.value || 'all';
      const filtered = Search.filterTasks(allTasks, query, { status, priority, uid });
      renderTaskTable(filtered);
    }

    function renderTaskTable(tasks) {
      const container = document.getElementById('tasks-table-container');
      if (!tasks.length) {
        container.innerHTML = `<div class="empty-state"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg><h3>No tasks found</h3><p>Try adjusting your filters or create a new task.</p></div>`;
        return;
      }
      container.innerHTML = `
        <div class="table-wrapper">
          <table class="table">
            <thead><tr>
              <th>Task</th>
              <th>Assigned To</th>
              <th>Priority</th>
              <th>Deadline</th>
              <th>Status</th>
              <th>Progress Note</th>
              <th style="text-align:right">Actions</th>
            </tr></thead>
            <tbody>
              ${tasks.map(t => `
                <tr>
                  <td>
                    <div class="td-primary" style="cursor:pointer;color:var(--accent)" onclick="openTaskDetail('${t.id}')">${truncate(t.title, 38)}</div>
                    ${t.description ? `<div style="font-size:0.72rem;color:var(--text-muted);margin-top:2px">${truncate(t.description,50)}</div>` : ''}
                  </td>
                  <td><div style="display:flex;align-items:center;gap:0.5rem"><div class="avatar avatar-sm">${getInitials(t.assignedToName||'U')}</div><span style="font-size:0.82rem">${t.assignedToName||'—'}</span></div></td>
                  <td>${priorityBadge(t.priority)}</td>
                  <td><div>${formatDate(t.deadline)}</div>${deadlineBadge(t.deadline)}</td>
                  <td>${statusBadge(t.status)}</td>
                  <td style="max-width:160px"><div style="font-size:0.75rem;color:var(--text-muted)">${t.progressNote ? truncate(t.progressNote,50) : '—'}</div></td>
                  <td>
                    <div style="display:flex;gap:0.35rem;justify-content:flex-end;flex-wrap:wrap">
                      ${(t.status === TASK_STATUS.SUBMITTED || t.status === TASK_STATUS.UNDER_REVIEW) ? `
                        <button class="btn btn-success btn-sm" onclick="approveTask('${t.id}',event)">✓</button>
                        <button class="btn btn-danger btn-sm" onclick="rejectTask('${t.id}',event)">✗</button>
                      ` : ''}
                      <button class="btn-icon" title="Edit" onclick="openEditModal('${t.id}',event)">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                      </button>
                      <button class="btn-icon" title="Delete" onclick="deleteTask('${t.id}','${t.title.replace(/'/g,'\\\'')}')" style="color:var(--prio-high)">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>
                      </button>
                    </div>
                  </td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
        <div style="padding:0.75rem 1rem;border-top:1px solid var(--border);font-size:0.75rem;color:var(--text-muted)">
          Showing ${tasks.length} task${tasks.length !== 1 ? 's' : ''}
        </div>
      `;
    }

    function openCreateModal() {
      editingTaskId = null;
      document.getElementById('modal-title').textContent = 'Create New Task';
      document.getElementById('save-task-btn').textContent = 'Create Task';
      document.getElementById('task-title').value = '';
      document.getElementById('task-desc').value = '';
      document.getElementById('task-assign').value = '';
      document.getElementById('task-priority').value = 'medium';
      const today = new Date(); today.setDate(today.getDate() + 7);
      document.getElementById('task-deadline').value = today.toISOString().split('T')[0];
      Modal.open('task-modal');
      document.getElementById('task-title').focus();
    }

    function openEditModal(taskId, e) {
      e?.stopPropagation();
      const task = allTasks.find(t => t.id === taskId);
      if (!task) return;
      editingTaskId = taskId;
      document.getElementById('modal-title').textContent = 'Edit Task';
      document.getElementById('save-task-btn').innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px"><polyline points="20 6 9 17 4 12"/></svg> Save Changes`;
      document.getElementById('task-title').value = task.title || '';
      document.getElementById('task-desc').value = task.description || '';
      document.getElementById('task-assign').value = task.assignedTo || '';
      document.getElementById('task-priority').value = task.priority || 'medium';
      if (task.deadline) {
        const d = task.deadline.toDate();
        document.getElementById('task-deadline').value = d.toISOString().split('T')[0];
      }
      Modal.open('task-modal');
    }

    async function saveTask() {
      const btn = document.getElementById('save-task-btn');
      const title    = document.getElementById('task-title').value.trim();
      const desc     = document.getElementById('task-desc').value.trim();
      const assignTo = document.getElementById('task-assign').value;
      const deadline = document.getElementById('task-deadline').value;
      const priority = document.getElementById('task-priority').value;
      if (!title || !assignTo || !deadline) { Toast.warning('Missing Fields', 'Title, assignee and deadline are required.'); return; }
      const assignee = allUsers.find(u => u.uid === assignTo);
      btn.disabled = true; btn.innerHTML = `<span class="spinner" style="width:13px;height:13px;border-width:2px"></span> Saving…`;
      try {
        if (editingTaskId) {
          await TasksService.update(editingTaskId, {
            title, description: desc, assignedTo: assignTo,
            assignedToName: assignee?.name || assignee?.email?.split('@')[0] || '—',
            deadline, priority
          });
          Toast.success('Updated!', 'Task updated successfully.');
        } else {
          await TasksService.create({
            title, description: desc, assignedTo: assignTo,
            assignedToName: assignee?.name || assignee?.email?.split('@')[0] || '—',
            deadline, priority
          });
          Toast.success('Task Created!', `"${title}" assigned to ${assignee?.name || 'user'}.`);
        }
        Modal.close('task-modal');
      } catch (e) { Toast.error('Error', e.message); }
      finally { btn.disabled = false; btn.innerHTML = editingTaskId ? 'Save Changes' : 'Create Task'; }
    }

    async function deleteTask(id, title) {
      if (await confirmDialog(`Delete task: "${title}"? This cannot be undone.`)) {
        try { await TasksService.delete(id); Toast.success('Deleted', `Task removed.`); }
        catch(e) { Toast.error('Error', e.message); }
      }
    }

    async function approveTask(id, e) {
      e?.stopPropagation();
      const task = allTasks.find(t => t.id === id);
      if (!task) return;
      if (await confirmDialog(`Approve: "${task.title}"?`)) {
        try { await TasksService.approve(id, task); Toast.success('Approved!', 'Task marked as completed.'); }
        catch(e) { Toast.error('Error', e.message); }
      }
    }

    async function rejectTask(id, e) {
      e?.stopPropagation();
      const task = allTasks.find(t => t.id === id);
      if (!task) return;
      const reason = prompt('Reason for rejection (optional):') || '';
      try { await TasksService.reject(id, task, reason); Toast.info('Rejected', 'Task sent back to user.'); }
      catch(e) { Toast.error('Error', e.message); }
    }

    async function openTaskDetail(id) {
      const task = allTasks.find(t => t.id === id);
      if (!task) return;
      const modal = document.getElementById('task-detail-content');
      const flowStatuses = ['pending','in_progress','submitted','under_review','completed'];
      const flowLabels   = ['Pending','In Progress','Submitted','Under Review','Completed'];
      const currentIdx   = flowStatuses.indexOf(task.status);

      modal.innerHTML = `
        <div class="modal-header">
          <h2 class="modal-title">${task.title}</h2>
          <button class="modal-close" onclick="Modal.close('task-detail-modal')">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:18px;height:18px"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.5rem;margin-bottom:1rem">
          <div style="font-size:0.78rem;color:var(--text-muted)">Assigned To</div><div style="font-size:0.82rem;color:var(--text-primary);font-weight:600">${task.assignedToName||'—'}</div>
          <div style="font-size:0.78rem;color:var(--text-muted)">Deadline</div><div>${formatDate(task.deadline)} ${deadlineBadge(task.deadline)}</div>
          <div style="font-size:0.78rem;color:var(--text-muted)">Priority</div><div>${priorityBadge(task.priority)}</div>
          <div style="font-size:0.78rem;color:var(--text-muted)">Status</div><div>${statusBadge(task.status)}</div>
          <div style="font-size:0.78rem;color:var(--text-muted)">Created</div><div style="font-size:0.78rem;color:var(--text-secondary)">${formatDate(task.createdAt)}</div>
          ${task.completedAt ? `<div style="font-size:0.78rem;color:var(--text-muted)">Completed</div><div style="font-size:0.78rem;color:var(--status-completed)">${formatDate(task.completedAt)}</div>` : ''}
        </div>
        <!-- Status flow -->
        <div style="margin-bottom:1rem">
          <div style="font-size:0.75rem;font-weight:600;color:var(--text-muted);margin-bottom:0.6rem;text-transform:uppercase;letter-spacing:0.06em">Workflow Progress</div>
          <div class="task-status-flow">
            ${flowStatuses.map((s,i) => `
              <div class="flow-step">
                <div style="display:flex;flex-direction:column;align-items:center">
                  <div class="flow-dot ${i < currentIdx ? 'done' : i === currentIdx ? 'active' : ''}"></div>
                  <div class="flow-label">${flowLabels[i]}</div>
                </div>
                ${i < flowStatuses.length-1 ? `<div class="flow-line ${i < currentIdx ? 'done' : ''}"></div>` : ''}
              </div>
            `).join('')}
          </div>
        </div>
        ${task.description ? `<div style="margin-bottom:1rem"><div style="font-size:0.75rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:0.4rem">Description</div><div style="font-size:0.83rem;color:var(--text-secondary);line-height:1.5">${task.description}</div></div>` : ''}
        ${task.progressNote ? `<div style="background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:0.85rem;margin-bottom:1rem"><div style="font-size:0.72rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:4px">Progress Note from User</div><div style="font-size:0.83rem;color:var(--text-primary)">${task.progressNote}</div></div>` : ''}
        <!-- Comments -->
        <div>
          <div style="font-size:0.75rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:0.75rem">Comments & Feedback</div>
          <div class="comment-list" id="comment-list-${id}"><div class="spinner" style="margin:1rem auto"></div></div>
          <div style="display:flex;gap:0.5rem;margin-top:1rem">
            <textarea id="new-comment-${id}" class="form-control" rows="2" placeholder="Add feedback or comment…" style="flex:1"></textarea>
            <button class="btn btn-primary" onclick="addComment('${id}')">Post</button>
          </div>
        </div>
        ${(task.status === TASK_STATUS.SUBMITTED || task.status === TASK_STATUS.UNDER_REVIEW) ? `
          <div class="modal-footer">
            <button class="btn btn-success" onclick="approveTask('${id}',event);Modal.close('task-detail-modal')">✓ Approve & Complete</button>
            <button class="btn btn-danger" onclick="rejectTask('${id}',event);Modal.close('task-detail-modal')">✗ Reject & Send Back</button>
          </div>
        ` : ''}
      `;
      Modal.open('task-detail-modal');
      // Load comments
      CommentsService.onComments(id, comments => {
        const el = document.getElementById(`comment-list-${id}`);
        if (!el) return;
        if (!comments.length) { el.innerHTML = `<div style="font-size:0.8rem;color:var(--text-muted);text-align:center;padding:0.75rem">No comments yet. Add the first one!</div>`; return; }
        el.innerHTML = comments.map(c => `
          <div class="comment-item">
            <div class="avatar avatar-sm">${getInitials(c.authorName||'A')}</div>
            <div class="comment-bubble">
              <div class="comment-meta">
                <span class="comment-author">${c.authorName||'Unknown'}</span>
                <span class="comment-time">${timeAgo(c.createdAt)}</span>
              </div>
              <div class="comment-text">${c.text}</div>
            </div>
          </div>
        `).join('');
      });
    }

    async function addComment(taskId) {
      const input = document.getElementById(`new-comment-${taskId}`);
      const text = input?.value.trim();
      if (!text) return;
      try {
        await CommentsService.add(taskId, text);
        input.value = '';
      } catch(e) { Toast.error('Error', e.message); }
    }

    // Search shortcut from header
    const Search = { filterTasks(tasks, q, f) {
      let r = [...tasks];
      if (q) { const qL = q.toLowerCase(); r = r.filter(t => t.title?.toLowerCase().includes(qL)||t.assignedToName?.toLowerCase().includes(qL)); }
      if (f.status && f.status !== 'all') r = r.filter(t => t.status === f.status);
      if (f.priority && f.priority !== 'all') r = r.filter(t => t.priority === f.priority);
      if (f.uid && f.uid !== 'all') r = r.filter(t => t.assignedTo === f.uid);
      return r;
    }};

    init();
  </script>
</body>
</html>
