<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Content Pipeline — ELECTRONICS VALA</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/css/main.css" />

</head>
<body>
  <div class="page-loader" id="page-loader"><div class="loader-logo" style="width:48px;height:48px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border-radius:12px;display:flex;align-items:center;justify-content:center"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:26px;height:26px"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg></div><div class="spinner"></div></div>

  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <header class="app-header" id="app-header"></header>
    <main class="main-content">
      <div class="page-header">
        <div>
          <h1 class="page-title">Content Pipeline</h1>
          <p class="page-subtitle">Plan and track all YouTube content pieces</p>
        </div>
        <button class="btn btn-primary" id="add-content-btn">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:15px;height:15px"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Add Content
        </button>
      </div>

      <!-- Pipeline stats -->
      <div class="stats-grid" id="pipeline-stats" style="margin-bottom:1.25rem">
        <div class="stat-card"><div style="height:60px;display:flex;align-items:center;justify-content:center"><div class="spinner"></div></div></div>
        <div class="stat-card"><div style="height:60px;display:flex;align-items:center;justify-content:center"><div class="spinner"></div></div></div>
        <div class="stat-card"><div style="height:60px;display:flex;align-items:center;justify-content:center"><div class="spinner"></div></div></div>
        <div class="stat-card"><div style="height:60px;display:flex;align-items:center;justify-content:center"><div class="spinner"></div></div></div>
      </div>

      <!-- Filters -->
      <div class="filters-bar">
        <input type="text" id="pipeline-search" class="form-control" style="width:220px" placeholder="🔍 Search content…" />
        <select class="filter-select" id="filter-pipeline-status">
          <option value="all">All Status</option>
          <option value="upcoming">Upcoming</option>
          <option value="in_progress">In Progress</option>
          <option value="completed">Completed</option>
        </select>
        <button class="btn btn-secondary btn-sm" id="filter-reset">Clear</button>
      </div>

      <!-- Kanban-style columns -->
      <div class="pipeline-cols" id="pipeline-kanban">
        <div style="text-align:center;padding:3rem;grid-column:1/-1"><div class="spinner"></div></div>
      </div>

      <!-- Full table below -->
      <div class="card" style="margin-top:1.25rem">
        <div class="card-header"><div class="card-title">All Content Entries</div></div>
        <div id="pipeline-table"></div>
      </div>
    </main>
  </div>

  <!-- ADD / EDIT CONTENT MODAL -->
  <div class="modal-overlay" id="content-modal">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title" id="content-modal-title">Add Content</h2>
        <button class="modal-close" onclick="Modal.close('content-modal')"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:18px;height:18px"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
      </div>
      <div class="form-group"><label class="form-label">Content Title *</label><input type="text" id="c-title" class="form-control" placeholder="e.g. iPhone 16 Review" /></div>
      <div class="form-grid">
        <div class="form-group"><label class="form-label">Assigned To *</label><select id="c-assign" class="form-control"><option value="">Select member…</option></select></div>
        <div class="form-group"><label class="form-label">Target Month *</label><input type="month" id="c-month" class="form-control" /></div>
        <div class="form-group"><label class="form-label">Status</label><select id="c-status" class="form-control"><option value="upcoming">Upcoming</option><option value="in_progress">In Progress</option><option value="completed">Completed</option></select></div>
      </div>
      <div class="form-group"><label class="form-label">Performance Notes</label><textarea id="c-notes" class="form-control" rows="2" placeholder="Views, engagement, notes after uploading…"></textarea></div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="Modal.close('content-modal')">Cancel</button>
        <button class="btn btn-primary" id="save-content-btn">Add Content</button>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <script src="../assets/js/firebase-config.js"></script>
  <script src="../assets/js/ui.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/notifications.js"></script>
  <script src="../assets/js/pipeline.js"></script>

  <script>
    let allContent = [], allUsers = [], editingContentId = null, pipelineUnsub = null;

    async function init() {
      const profile = await requireAuth('admin');
      document.getElementById('sidebar').innerHTML = buildSidebar('admin', 'pipeline');
      document.getElementById('app-header').innerHTML = buildHeader('Content Pipeline');
      initDropdowns(); initMobileSidebar();
      populateUserUI(profile);
      NotifService.listen(profile.uid, n => NotifService.renderDropdown(profile.uid, n));
      await loadUsers();
      subscribePipeline();
      document.getElementById('add-content-btn').addEventListener('click', openAddModal);
      document.getElementById('save-content-btn').addEventListener('click', saveContent);
      document.getElementById('filter-reset').addEventListener('click', () => {
        document.getElementById('pipeline-search').value = '';
        document.getElementById('filter-pipeline-status').value = 'all';
        renderAll();
      });
      ['pipeline-search','filter-pipeline-status'].forEach(id => {
        document.getElementById(id)?.addEventListener('input', debounce(renderAll, 250));
        document.getElementById(id)?.addEventListener('change', renderAll);
      });
    }

    async function loadUsers() {
      const snap = await db.collection(COLLECTIONS.USERS).get();
      allUsers = snap.docs.map(d => ({ uid: d.id, ...d.data() }));
      const sel = document.getElementById('c-assign');
      allUsers.forEach(u => sel.innerHTML += `<option value="${u.uid}" data-name="${u.name||u.email.split('@')[0]}">${u.name||u.email.split('@')[0]}</option>`);
    }

    function subscribePipeline() {
      if (pipelineUnsub) pipelineUnsub();
      pipelineUnsub = PipelineService.onAll(items => {
        allContent = items;
        renderAll();
        renderStats();
      });
    }

    async function renderStats() {
      const s = await PipelineService.getStats();
      document.getElementById('pipeline-stats').innerHTML = `
        <div class="stat-card"><div class="stat-label">Total Content</div><div class="stat-value">${s.total}</div></div>
        <div class="stat-card"><div class="stat-label">Upcoming</div><div class="stat-value" style="color:var(--status-pending)">${s.upcoming}</div></div>
        <div class="stat-card"><div class="stat-label">In Progress</div><div class="stat-value" style="color:var(--status-progress)">${s.inProgress}</div></div>
        <div class="stat-card"><div class="stat-label">Completed</div><div class="stat-value" style="color:var(--status-completed)">${s.completed}</div></div>
      `;
    }

    function renderAll() {
      const q = document.getElementById('pipeline-search')?.value || '';
      const s = document.getElementById('filter-pipeline-status')?.value || 'all';
      let items = [...allContent];
      if (q) { const ql = q.toLowerCase(); items = items.filter(i => i.title?.toLowerCase().includes(ql)||i.assignedToName?.toLowerCase().includes(ql)); }
      if (s !== 'all') items = items.filter(i => i.status === s);
      renderKanban(items);
      renderTable(items);
    }

    function renderKanban(items) {
      const upcoming   = items.filter(i => i.status === 'upcoming');
      const inProgress = items.filter(i => i.status === 'in_progress');
      const completed  = items.filter(i => i.status === 'completed');
      const colIcon = { upcoming:'🗒️', in_progress:'🎬', completed:'✅' };
      const colColors = { upcoming:'var(--status-pending)', in_progress:'var(--status-progress)', completed:'var(--status-completed)' };
      function colHTML(label, key, list) {
        return `
          <div class="pipeline-col">
            <div class="pipeline-col-header" style="color:${colColors[key]}">
              <span>${colIcon[key]}</span> ${label}
              <span class="nav-badge" style="margin-left:auto;background:${colColors[key]}22;color:${colColors[key]}">${list.length}</span>
            </div>
            ${list.length === 0 ? `<div style="font-size:0.78rem;color:var(--text-muted);text-align:center;padding:1rem">No items</div>` : ''}
            ${list.map(i => `
              <div class="pipeline-item" onclick="openEditModal('${i.id}')">
                <div class="pipeline-item-title">${i.title}</div>
                <div class="pipeline-item-meta">→ ${i.assignedToName||'—'} · ${i.targetMonth||'—'}</div>
                ${i.performanceNotes ? `<div style="font-size:0.7rem;color:var(--text-muted);margin-top:4px">${truncate(i.performanceNotes,50)}</div>` : ''}
                <div style="display:flex;justify-content:flex-end;gap:0.35rem;margin-top:0.5rem">
                  <button class="btn-icon" onclick="event.stopPropagation();deleteContent('${i.id}','${i.title.replace(/'/g,'\\\'')}')" style="color:var(--prio-high);width:24px;height:24px">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>
                  </button>
                </div>
              </div>
            `).join('')}
          </div>
        `;
      }
      document.getElementById('pipeline-kanban').innerHTML =
        colHTML('Upcoming', 'upcoming', upcoming) +
        colHTML('In Progress', 'in_progress', inProgress) +
        colHTML('Completed', 'completed', completed);
    }

    function renderTable(items) {
      if (!items.length) { document.getElementById('pipeline-table').innerHTML = `<div class="empty-state" style="padding:1.5rem"><p>No content entries match your filters.</p></div>`; return; }
      const statusBadgePipeline = s => {
        const m = {upcoming:['badge-pending','🗒️ Upcoming'], in_progress:['badge-progress','🎬 In Progress'], completed:['badge-completed','✅ Completed']};
        const [c,l] = m[s]||['badge-pending',s];
        return `<span class="badge ${c}">${l}</span>`;
      };
      document.getElementById('pipeline-table').innerHTML = `
        <div class="table-wrapper">
          <table class="table">
            <thead><tr><th>Title</th><th>Assigned To</th><th>Target Month</th><th>Status</th><th>Performance Notes</th><th>Actions</th></tr></thead>
            <tbody>${items.map(i => `
              <tr>
                <td class="td-primary">${i.title}</td>
                <td><div style="display:flex;align-items:center;gap:0.4rem"><div class="avatar avatar-sm">${getInitials(i.assignedToName||'U')}</div>${i.assignedToName||'—'}</div></td>
                <td style="font-size:0.8rem;color:var(--text-secondary)">${i.targetMonth||'—'}</td>
                <td>${statusBadgePipeline(i.status)}</td>
                <td style="max-width:180px;font-size:0.75rem;color:var(--text-muted)">${i.performanceNotes ? truncate(i.performanceNotes,60) : '—'}</td>
                <td>
                  <div style="display:flex;gap:0.35rem">
                    <button class="btn-icon" onclick="openEditModal('${i.id}')"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
                    <button class="btn-icon" onclick="deleteContent('${i.id}','${i.title.replace(/'/g,'\\\'')}')" style="color:var(--prio-high)"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg></button>
                  </div>
                </td>
              </tr>
            `).join('')}</tbody>
          </table>
        </div>
      `;
    }

    function openAddModal() {
      editingContentId = null;
      document.getElementById('content-modal-title').textContent = 'Add Content';
      document.getElementById('save-content-btn').textContent = 'Add Content';
      document.getElementById('c-title').value = '';
      document.getElementById('c-assign').value = '';
      document.getElementById('c-month').value = new Date().toISOString().slice(0,7);
      document.getElementById('c-status').value = 'upcoming';
      document.getElementById('c-notes').value = '';
      Modal.open('content-modal');
    }

    function openEditModal(id) {
      const item = allContent.find(i => i.id === id); if (!item) return;
      editingContentId = id;
      document.getElementById('content-modal-title').textContent = 'Edit Content';
      document.getElementById('save-content-btn').textContent = 'Save Changes';
      document.getElementById('c-title').value = item.title||'';
      document.getElementById('c-assign').value = item.assignedTo||'';
      document.getElementById('c-month').value = item.targetMonth||'';
      document.getElementById('c-status').value = item.status||'upcoming';
      document.getElementById('c-notes').value = item.performanceNotes||'';
      Modal.open('content-modal');
    }

    async function saveContent() {
      const title = document.getElementById('c-title').value.trim();
      const assignTo = document.getElementById('c-assign').value;
      const month = document.getElementById('c-month').value;
      const status = document.getElementById('c-status').value;
      const notes = document.getElementById('c-notes').value.trim();
      if (!title || !assignTo || !month) { Toast.warning('Missing Fields', 'Title, assignee and month are required.'); return; }
      const assignee = allUsers.find(u => u.uid === assignTo);
      const btn = document.getElementById('save-content-btn');
      btn.disabled = true;
      try {
        const data = { title, assignedTo: assignTo, assignedToName: assignee?.name||assignee?.email?.split('@')[0]||'—', targetMonth: month, status, performanceNotes: notes };
        if (editingContentId) { await PipelineService.update(editingContentId, data); Toast.success('Updated!', 'Content entry updated.'); }
        else { await PipelineService.create(data); Toast.success('Added!', `"${title}" added to pipeline.`); }
        Modal.close('content-modal');
      } catch(e) { Toast.error('Error', e.message); }
      finally { btn.disabled = false; btn.textContent = editingContentId ? 'Save Changes' : 'Add Content'; }
    }

    async function deleteContent(id, title) {
      if (await confirmDialog(`Delete "${title}" from pipeline?`)) {
        try { await PipelineService.delete(id); Toast.success('Deleted', 'Entry removed from pipeline.'); }
        catch(e) { Toast.error('Error', e.message); }
      }
    }

    init();
  </script>
</body>
</html>
