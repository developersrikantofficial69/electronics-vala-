<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Team Members — ELECTRONICS VALA</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/css/main.css" />

</head>
<body>
  <div class="page-loader" id="page-loader"><div class="loader-logo" style="width:48px;height:48px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border-radius:12px;display:flex;align-items:center;justify-content:center"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:26px;height:26px"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg></div><div class="spinner"></div></div>

  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <header class="app-header" id="app-header"></header>
    <main class="main-content">
      <div class="page-header">
        <div>
          <h1 class="page-title">Team Members</h1>
          <p class="page-subtitle">Overview and individual performance of all team members</p>
        </div>
      </div>
      <div id="users-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:1rem">
        <div style="text-align:center;padding:3rem;grid-column:1/-1"><div class="spinner"></div></div>
      </div>
    </main>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <script src="../assets/js/firebase-config.js"></script>
  <script src="../assets/js/ui.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/tasks.js"></script>
  <script src="../assets/js/notifications.js"></script>

  <script>
    async function init() {
      const profile = await requireAuth('admin');
      document.getElementById('sidebar').innerHTML = buildSidebar('admin', 'users');
      document.getElementById('app-header').innerHTML = buildHeader('Team Members');
      initDropdowns(); initMobileSidebar();
      populateUserUI(profile);
      NotifService.listen(profile.uid, n => NotifService.renderDropdown(profile.uid, n));
      loadUsers();
    }

    async function loadUsers() {
      const [usersSnap, perUserStats] = await Promise.all([
        db.collection(COLLECTIONS.USERS).get(),
        TasksService.getPerUserStats()
      ]);

      const users = usersSnap.docs.map(d => ({ uid: d.id, ...d.data() }));
      const statsMap = {};
      perUserStats.forEach(u => statsMap[u.uid] = u);
      const grid = document.getElementById('users-grid');

      if (!users.length) {
        grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><p>No users found.</p></div>`;
        return;
      }

      grid.innerHTML = users.map(u => {
        const s = statsMap[u.uid] || { total:0, completed:0, inProgress:0, pending:0, submitted:0 };
        const rate = s.total > 0 ? Math.round((s.completed / s.total) * 100) : 0;
        const rolebadge = u.role === 'admin'
          ? `<span class="badge badge-review">👑 Admin</span>`
          : `<span class="badge badge-progress">👤 Member</span>`;
        return `
          <div class="card" style="display:flex;flex-direction:column;gap:1rem">
            <div style="display:flex;align-items:center;gap:1rem">
              <div class="avatar avatar-lg">${getInitials(u.name||u.email)}</div>
              <div style="flex:1;min-width:0">
                <div style="font-size:0.95rem;font-weight:700;color:var(--text-primary)">${u.name || '—'}</div>
                <div style="font-size:0.75rem;color:var(--text-muted);margin-top:2px">${u.email}</div>
                <div style="margin-top:4px">${rolebadge}</div>
              </div>
            </div>
            <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:0.5rem;text-align:center">
              <div style="background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:0.6rem">
                <div style="font-size:1.1rem;font-weight:800;color:var(--text-primary)">${s.total}</div>
                <div style="font-size:0.62rem;color:var(--text-muted);margin-top:1px">Assigned</div>
              </div>
              <div style="background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:0.6rem">
                <div style="font-size:1.1rem;font-weight:800;color:var(--status-completed)">${s.completed}</div>
                <div style="font-size:0.62rem;color:var(--text-muted);margin-top:1px">Done</div>
              </div>
              <div style="background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:0.6rem">
                <div style="font-size:1.1rem;font-weight:800;color:var(--status-progress)">${s.inProgress}</div>
                <div style="font-size:0.62rem;color:var(--text-muted);margin-top:1px">Active</div>
              </div>
              <div style="background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:0.6rem">
                <div style="font-size:1.1rem;font-weight:800;color:var(--status-submitted)">${s.submitted}</div>
                <div style="font-size:0.62rem;color:var(--text-muted);margin-top:1px">Submitted</div>
              </div>
            </div>
            <div>
              <div style="display:flex;justify-content:space-between;font-size:0.72rem;color:var(--text-muted);margin-bottom:4px">
                <span>Completion Rate</span><span style="font-weight:700;color:var(--text-primary)">${rate}%</span>
              </div>
              <div class="progress-bar"><div class="progress-fill" style="width:${rate}%;background:linear-gradient(90deg,#6366f1,#10b981)"></div></div>
            </div>
            <div style="display:flex;gap:0.5rem">
              <a href="./tasks.html?uid=${u.uid}" class="btn btn-secondary btn-sm" style="flex:1;justify-content:center">View Tasks</a>
            </div>
          </div>
        `;
      }).join('');
    }

    init();
  </script>
</body>
</html>
