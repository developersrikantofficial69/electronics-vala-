<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard — ELECTRONICS VALA</title>
  <meta name="description" content="Admin dashboard for ELECTRONICS VALA — overview of all tasks, team activity, and content pipeline." />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/css/main.css" />

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
  <div class="page-loader" id="page-loader">
    <div class="loader-logo" style="width:48px;height:48px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border-radius:12px;display:flex;align-items:center;justify-content:center">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:26px;height:26px"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>
    </div>
    <div class="spinner"></div>
  </div>

  <div class="app-layout">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar"></aside>

    <!-- Header -->
    <header class="app-header" id="app-header"></header>

    <!-- Main Content -->
    <main class="main-content">
      <div class="page-header">
        <div>
          <h1 class="page-title">Dashboard</h1>
          <p class="page-subtitle" id="welcome-msg">Welcome back, Admin!</p>
        </div>
        <div style="display:flex;gap:0.5rem;align-items:center">
          <a href="./tasks.html" class="btn btn-primary">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:15px;height:15px"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Create Task
          </a>
        </div>
      </div>

      <!-- Stats Grid -->
      <div class="stats-grid" id="stats-grid">
        <!-- Populated by JS -->
        <div class="stat-card"><div style="height:80px;display:flex;align-items:center;justify-content:center"><div class="spinner"></div></div></div>
        <div class="stat-card"><div style="height:80px;display:flex;align-items:center;justify-content:center"><div class="spinner"></div></div></div>
        <div class="stat-card"><div style="height:80px;display:flex;align-items:center;justify-content:center"><div class="spinner"></div></div></div>
        <div class="stat-card"><div style="height:80px;display:flex;align-items:center;justify-content:center"><div class="spinner"></div></div></div>
      </div>

      <!-- Charts Row -->
      <div class="grid-2" style="margin-bottom:1.25rem">
        <div class="card">
          <div class="card-header">
            <div>
              <div class="card-title">Task Status Overview</div>
              <div class="card-subtitle">Distribution across all stages</div>
            </div>
          </div>
          <div class="chart-container" style="max-height:230px">
            <canvas id="status-donut"></canvas>
          </div>
        </div>
        <div class="card">
          <div class="card-header">
            <div>
              <div class="card-title">Monthly Output</div>
              <div class="card-subtitle">Tasks completed per month</div>
            </div>
          </div>
          <div class="chart-container" style="max-height:230px">
            <canvas id="monthly-bar"></canvas>
          </div>
        </div>
      </div>

      <!-- Bottom Row: Activity + Pipeline summary -->
      <div class="grid-2">
        <div class="card">
          <div class="card-header">
            <div class="card-title">Recent Activity</div>
            <a href="./tasks.html" class="btn btn-ghost btn-sm">View all →</a>
          </div>
          <div class="activity-list" id="activity-list">
            <div style="text-align:center;padding:2rem;color:var(--text-muted)"><div class="spinner"></div></div>
          </div>
        </div>
        <div class="card">
          <div class="card-header">
            <div class="card-title">Team Productivity</div>
            <a href="./analytics.html" class="btn btn-ghost btn-sm">Details →</a>
          </div>
          <div id="user-prod-list">
            <div style="text-align:center;padding:2rem;color:var(--text-muted)"><div class="spinner"></div></div>
          </div>
        </div>
      </div>

      <!-- Pending Approvals -->
      <div class="card" style="margin-top:1.25rem">
        <div class="card-header">
          <div>
            <div class="card-title">⏳ Pending Approvals</div>
            <div class="card-subtitle">Tasks submitted by team — awaiting your review</div>
          </div>
          <a href="./tasks.html?filter=submitted" class="btn btn-secondary btn-sm">See All</a>
        </div>
        <div id="pending-approvals">
          <div style="text-align:center;padding:2rem;color:var(--text-muted)"><div class="spinner"></div></div>
        </div>
      </div>
    </main>
  </div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <script src="../assets/js/firebase-config.js"></script>
  <script src="../assets/js/ui.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/tasks.js"></script>
  <script src="../assets/js/notifications.js"></script>
  <script src="../assets/js/pipeline.js"></script>

  <script>
    let currentProfile = null;

    async function init() {
      currentProfile = await requireAuth('admin');
      // Build sidebar & header
      document.getElementById('sidebar').innerHTML = buildSidebar('admin', 'dashboard');
      document.getElementById('app-header').innerHTML = buildHeader('Dashboard');
      initDropdowns(); initMobileSidebar();
      populateUserUI(currentProfile);
      document.getElementById('welcome-msg').textContent = `Welcome back, ${currentProfile.name || 'Admin'}! 👋`;

      // Load notifications
      NotifService.listen(currentProfile.uid, notifs => {
        NotifService.renderDropdown(currentProfile.uid, notifs);
      });

      loadDashboard();
    }

    async function loadDashboard() {
      const [stats, perUser, monthly, allTasks] = await Promise.all([
        TasksService.getStats(),
        TasksService.getPerUserStats(),
        TasksService.getMonthlyCompletions(),
        TasksService.getAll()
      ]);

      renderStats(stats, perUser.length);
      Analytics.renderStatusDonut('status-donut', stats);
      Analytics.renderMonthlyBar('monthly-bar', monthly);
      renderActivityFeed(allTasks);
      renderUserProductivity(perUser);
      renderPendingApprovals(allTasks);
    }

    function renderStats(stats, memberCount) {
      const completionRate = stats.total > 0 ? Math.round((stats.completed / stats.total) * 100) : 0;
      document.getElementById('stats-grid').innerHTML = `
        <div class="stat-card">
          <div class="stat-icon" style="background:rgba(99,102,241,0.12);color:var(--accent)">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
          </div>
          <div class="stat-label">Total Tasks</div>
          <div class="stat-value">${stats.total}</div>
          <div class="stat-change">${stats.completed} completed • ${stats.pending} pending</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon" style="background:rgba(59,130,246,0.12);color:#3b82f6">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
          </div>
          <div class="stat-label">In Progress</div>
          <div class="stat-value">${stats.inProgress + stats.submitted + stats.underReview}</div>
          <div class="stat-change">${stats.submitted} submitted • ${stats.underReview} under review</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon" style="background:rgba(16,185,129,0.12);color:var(--status-completed)">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
          </div>
          <div class="stat-label">Completion Rate</div>
          <div class="stat-value">${completionRate}%</div>
          <div class="stat-change positive">${stats.completed} tasks approved</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon" style="background:rgba(139,92,246,0.12);color:var(--accent-2)">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
          </div>
          <div class="stat-label">Team Members</div>
          <div class="stat-value">${memberCount || 3}</div>
          <div class="stat-change">Active contributors</div>
        </div>
      `;

      // Animate progress
      document.querySelectorAll('.progress-fill').forEach(el => {
        const val = el.dataset.width || '0';
        setTimeout(() => el.style.width = val + '%', 100);
      });
    }

    function renderActivityFeed(tasks) {
      const recent = tasks
        .filter(t => t.status !== TASK_STATUS.PENDING)
        .sort((a, b) => {
          const ta = a.createdAt?.toDate?.() || new Date(0);
          const tb = b.createdAt?.toDate?.() || new Date(0);
          return tb - ta;
        })
        .slice(0, 8);

      if (!recent.length) {
        document.getElementById('activity-list').innerHTML = `<div class="empty-state" style="padding:1.5rem"><p>No activity yet</p></div>`;
        return;
      }

      const statusLabels = {
        pending:      'is pending',
        in_progress:  'started working on',
        submitted:    'submitted',
        under_review: 'is under review for',
        completed:    'completed'
      };
      const statusColors = { pending:'var(--status-pending)', in_progress:'var(--status-progress)', submitted:'var(--status-submitted)', under_review:'var(--status-review)', completed:'var(--status-completed)' };

      document.getElementById('activity-list').innerHTML = recent.map(t => `
        <div class="activity-item">
          <div class="activity-dot" style="background:${statusColors[t.status]||'var(--accent)'}"></div>
          <div>
            <div class="activity-text">
              <strong>${t.assignedToName || 'User'}</strong> ${statusLabels[t.status] || 'updated'} <strong>${truncate(t.title, 30)}</strong>
            </div>
            <div class="activity-time">${timeAgo(t.createdAt)}</div>
          </div>
        </div>
      `).join('');
    }

    function renderUserProductivity(perUser) {
      const el = document.getElementById('user-prod-list');
      if (!perUser.length) { el.innerHTML = `<div class="empty-state"><p>No data yet</p></div>`; return; }
      el.innerHTML = perUser.map(u => {
        const rate = u.total > 0 ? Math.round((u.completed / u.total) * 100) : 0;
        return `
          <div class="user-prod-row">
            <div class="avatar">${getInitials(u.name)}</div>
            <div class="user-prod-info">
              <div class="user-prod-name">${u.name}</div>
              <div class="user-prod-stats">${u.completed} done · ${u.inProgress} active · ${u.pending} pending</div>
            </div>
            <div class="user-prod-bar">
              <div style="font-size:0.72rem;color:var(--text-muted);text-align:right;margin-bottom:2px">${rate}%</div>
              <div class="progress-bar"><div class="progress-fill" style="width:${rate}%;background:linear-gradient(90deg,#6366f1,#10b981)"></div></div>
            </div>
          </div>
        `;
      }).join('');
    }

    function renderPendingApprovals(allTasks) {
      const submitted = allTasks.filter(t => t.status === TASK_STATUS.SUBMITTED || t.status === TASK_STATUS.UNDER_REVIEW);
      const el = document.getElementById('pending-approvals');
      if (!submitted.length) {
        el.innerHTML = `<div class="empty-state" style="padding:1.5rem"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg><h3>All Clear!</h3><p>No pending submissions right now.</p></div>`;
        return;
      }
      el.innerHTML = `
        <div class="table-wrapper">
          <table class="table">
            <thead><tr><th>Task</th><th>Assigned To</th><th>Priority</th><th>Deadline</th><th>Status</th><th>Actions</th></tr></thead>
            <tbody>
              ${submitted.map(t => `
                <tr>
                  <td class="td-primary">${truncate(t.title, 35)}</td>
                  <td><div style="display:flex;align-items:center;gap:0.5rem"><div class="avatar avatar-sm">${getInitials(t.assignedToName||'U')}</div>${t.assignedToName||'—'}</div></td>
                  <td>${priorityBadge(t.priority)}</td>
                  <td>${formatDate(t.deadline)} ${deadlineBadge(t.deadline)}</td>
                  <td>${statusBadge(t.status)}</td>
                  <td>
                    <div style="display:flex;gap:0.4rem">
                      <button class="btn btn-success btn-sm" onclick="approveTask('${t.id}','${t.title}','${t.assignedTo}')">✓ Approve</button>
                      <button class="btn btn-danger btn-sm" onclick="rejectTask('${t.id}','${t.title}','${t.assignedTo}')">✗ Reject</button>
                    </div>
                  </td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      `;
    }

    async function approveTask(id, title, assignedTo) {
      if (await confirmDialog(`Approve task: "${title}"?`)) {
        try {
          await TasksService.approve(id, { title, assignedTo });
          Toast.success('Approved!', `Task "${title}" marked as completed.`);
          loadDashboard();
        } catch(e) { Toast.error('Error', e.message); }
      }
    }

    async function rejectTask(id, title, assignedTo) {
      const reason = prompt('Reason for rejection (optional):') || '';
      try {
        await TasksService.reject(id, { title, assignedTo }, reason);
        Toast.info('Rejected', `Task sent back to user.`);
        loadDashboard();
      } catch(e) { Toast.error('Error', e.message); }
    }

    init();
  </script>
</body>
</html>
