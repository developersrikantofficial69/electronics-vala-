<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Tasks — ELECTRONICS VALA</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/css/main.css" />

</head>
<body>
  <div class="page-loader" id="page-loader"><div class="loader-logo" style="width:48px;height:48px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border-radius:12px;display:flex;align-items:center;justify-content:center"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:26px;height:26px"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg></div><div class="spinner"></div></div>

  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <header class="app-header" id="app-header"></header>
    <main class="main-content">
      <div class="page-header">
        <div><h1 class="page-title">My Tasks</h1><p class="page-subtitle">Track, update and submit your assigned work</p></div>
      </div>

      <!-- Filters -->
      <div class="filters-bar">
        <input type="text" id="task-search" class="form-control" style="width:220px" placeholder="🔍 Search tasks…" />
        <select class="filter-select" id="filter-status">
          <option value="all">All Status</option>
          <option value="pending">Pending</option>
          <option value="in_progress">In Progress</option>
          <option value="submitted">Submitted</option>
          <option value="under_review">Under Review</option>
          <option value="completed">Completed</option>
        </select>
        <select class="filter-select" id="filter-priority">
          <option value="all">All Priority</option>
          <option value="high">High</option>
          <option value="medium">Medium</option>
          <option value="low">Low</option>
        </select>
      </div>

      <!-- Task Cards -->
      <div id="tasks-container">
        <div style="text-align:center;padding:3rem"><div class="spinner"></div></div>
      </div>
    </main>
  </div>

  <!-- TASK ACTION MODAL (progress note + submit) -->
  <div class="modal-overlay" id="action-modal">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title" id="action-modal-title">Update Task</h2>
        <button class="modal-close" onclick="Modal.close('action-modal')"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:18px;height:18px"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
      </div>
      <input type="hidden" id="action-task-id" />
      <input type="hidden" id="action-type" />
      <div id="action-modal-body"></div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="Modal.close('action-modal')">Cancel</button>
        <button class="btn btn-primary" id="action-confirm-btn">Confirm</button>
      </div>
    </div>
  </div>

  <!-- TASK DETAIL MODAL -->
  <div class="modal-overlay" id="task-detail-modal">
    <div class="modal modal-lg" id="task-detail-content"></div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <script src="../assets/js/firebase-config.js"></script>
  <script src="../assets/js/ui.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/tasks.js"></script>
  <script src="../assets/js/notifications.js"></script>

  <script>
    let profile = null, allTasks = [], unsub = null;

    async function init() {
      profile = await requireAuth('user');
      document.getElementById('sidebar').innerHTML = buildSidebar('user', 'tasks');
      document.getElementById('app-header').innerHTML = buildHeader('My Tasks');
      initDropdowns(); initMobileSidebar();
      populateUserUI(profile);
      NotifService.listen(profile.uid, n => NotifService.renderDropdown(profile.uid, n));
      subscribe();
      setupFilters();
    }

    function subscribe() {
      if (unsub) unsub();
      unsub = TasksService.onForUser(profile.uid, tasks => {
        allTasks = tasks;
        applyFilters();
      });
    }

    function setupFilters() {
      ['task-search','filter-status','filter-priority'].forEach(id => {
        const el = document.getElementById(id);
        el?.addEventListener('input', debounce(applyFilters, 200));
        el?.addEventListener('change', applyFilters);
      });
    }

    function applyFilters() {
      const q = document.getElementById('task-search')?.value||'';
      const s = document.getElementById('filter-status')?.value||'all';
      const p = document.getElementById('filter-priority')?.value||'all';
      let filtered = [...allTasks];
      if (q) { const ql = q.toLowerCase(); filtered = filtered.filter(t => t.title?.toLowerCase().includes(ql)||t.description?.toLowerCase().includes(ql)); }
      if (s !== 'all') filtered = filtered.filter(t => t.status === s);
      if (p !== 'all') filtered = filtered.filter(t => t.priority === p);
      renderTasks(filtered);
    }

    function renderTasks(tasks) {
      const container = document.getElementById('tasks-container');
      if (!tasks.length) {
        container.innerHTML = `<div class="empty-state"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg><h3>No tasks found</h3><p>No tasks match your current filters.</p></div>`;
        return;
      }

      const priorityOrder = { high:0, medium:1, low:2 };
      tasks.sort((a,b) => (priorityOrder[a.priority]||1) - (priorityOrder[b.priority]||1));

      container.innerHTML = `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:1rem">${tasks.map(t => taskCard(t)).join('')}</div>`;
    }

    function taskCard(t) {
      const now = new Date();
      const deadline = t.deadline ? (t.deadline.toDate ? t.deadline.toDate() : new Date(t.deadline)) : null;
      const isOverdue = deadline && deadline < now && t.status !== TASK_STATUS.COMPLETED;
      const borderColor = isOverdue ? 'var(--prio-high)' : t.priority === 'high' ? 'var(--prio-high)' : t.priority === 'medium' ? 'var(--prio-medium)' : 'var(--border)';

      const actionBtns = () => {
        if (t.status === TASK_STATUS.PENDING) return `<button class="btn btn-primary btn-sm" onclick="openStartModal('${t.id}')">▶ Start Task</button>`;
        if (t.status === TASK_STATUS.IN_PROGRESS) return `<button class="btn btn-primary btn-sm" onclick="openSubmitModal('${t.id}')">📤 Submit Task</button>`;
        if (t.status === TASK_STATUS.SUBMITTED) return `<span style="font-size:0.75rem;color:var(--status-submitted)">⏳ Awaiting admin review…</span>`;
        if (t.status === TASK_STATUS.UNDER_REVIEW) return `<span style="font-size:0.75rem;color:var(--status-review)">🔍 Under review by admin</span>`;
        if (t.status === TASK_STATUS.COMPLETED) return `<span style="font-size:0.75rem;color:var(--status-completed)">✅ Completed &amp; Approved!</span>`;
        return '';
      };

      return `
        <div class="card" style="border-left:3px solid ${borderColor};cursor:pointer;transition:all 0.2s" onmouseenter="this.style.transform='translateY(-2px)'" onmouseleave="this.style.transform=''">
          <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:0.6rem;gap:0.5rem">
            <div style="font-size:0.9rem;font-weight:700;color:var(--text-primary);cursor:pointer;flex:1" onclick="openDetail('${t.id}')">${t.title}</div>
            ${priorityBadge(t.priority)}
          </div>
          ${t.description ? `<div style="font-size:0.78rem;color:var(--text-muted);margin-bottom:0.75rem;line-height:1.5">${truncate(t.description,80)}</div>` : ''}
          <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:0.5rem;margin-bottom:0.75rem">
            ${statusBadge(t.status)}
            <div style="display:flex;align-items:center;gap:0.5rem">
              ${t.deadline ? `<span style="font-size:0.72rem;color:var(--text-muted)">${formatDate(t.deadline)}</span>` : ''}
              ${deadlineBadge(t.deadline)}
            </div>
          </div>
          ${t.progressNote && t.status !== TASK_STATUS.PENDING ? `<div style="background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:0.5rem 0.7rem;margin-bottom:0.75rem;font-size:0.75rem;color:var(--text-secondary)"><span style="color:var(--text-muted);font-weight:700">Note: </span>${truncate(t.progressNote, 80)}</div>` : ''}
          <div style="display:flex;align-items:center;justify-content:space-between;padding-top:0.6rem;border-top:1px solid var(--border)">
            <div>${actionBtns()}</div>
            <button class="btn btn-ghost btn-sm" onclick="openDetail('${t.id}')">Details →</button>
          </div>
        </div>
      `;
    }

    function openStartModal(taskId) {
      const task = allTasks.find(t => t.id === taskId); if (!task) return;
      document.getElementById('action-task-id').value = taskId;
      document.getElementById('action-type').value = 'start';
      document.getElementById('action-modal-title').textContent = '▶ Start Task';
      document.getElementById('action-modal-body').innerHTML = `
        <p style="font-size:0.83rem;color:var(--text-secondary);margin-bottom:0.75rem">You're about to mark this task as <strong style="color:var(--status-progress)">In Progress</strong>.</p>
        <div style="font-size:0.9rem;font-weight:700;color:var(--text-primary);margin-bottom:0.5rem">${task.title}</div>
        <div class="form-group" style="margin-top:0.75rem">
          <label class="form-label">Starting Note (optional)</label>
          <textarea id="modal-note" class="form-control" rows="2" placeholder="Brief note about how you'll approach this task…"></textarea>
        </div>
      `;
      document.getElementById('action-confirm-btn').textContent = '▶ Start Task';
      document.getElementById('action-confirm-btn').onclick = () => confirmAction('start', taskId, task);
      Modal.open('action-modal');
    }

    function openSubmitModal(taskId) {
      const task = allTasks.find(t => t.id === taskId); if(!task) return;
      document.getElementById('action-task-id').value = taskId;
      document.getElementById('action-type').value = 'submit';
      document.getElementById('action-modal-title').textContent = '📤 Submit Task';
      document.getElementById('action-modal-body').innerHTML = `
        <p style="font-size:0.83rem;color:var(--text-secondary);margin-bottom:0.75rem">Submit your work on <strong style="color:var(--text-primary)">"${task.title}"</strong> for admin review.</p>
        <div class="form-group">
          <label class="form-label">Progress Note / What did you complete? *</label>
          <textarea id="modal-note" class="form-control" rows="3" placeholder="Describe what you've done, any links, or notes for the reviewer…" required></textarea>
        </div>
      `;
      document.getElementById('action-confirm-btn').textContent = '📤 Submit for Review';
      document.getElementById('action-confirm-btn').onclick = () => confirmAction('submit', taskId, task);
      Modal.open('action-modal');
    }

    async function confirmAction(type, taskId, task) {
      const note = document.getElementById('modal-note')?.value.trim() || '';
      if (type === 'submit' && !note) { Toast.warning('Note Required', 'Please describe what you completed before submitting.'); return; }
      const btn = document.getElementById('action-confirm-btn');
      btn.disabled = true; btn.innerHTML = `<span class="spinner" style="width:13px;height:13px;border-width:2px"></span>`;
      try {
        if (type === 'start') { await TasksService.start(taskId, note); Toast.success('Started!', 'Task marked as In Progress. Good luck! 💪'); }
        else { await TasksService.submit(taskId, task, note); Toast.success('Submitted!', 'Your work has been sent to admin for review.'); }
        Modal.close('action-modal');
      } catch(e) { Toast.error('Error', e.message); }
      finally { btn.disabled = false; btn.textContent = type === 'start' ? '▶ Start Task' : '📤 Submit for Review'; }
    }

    async function openDetail(taskId) {
      const task = allTasks.find(t => t.id === taskId) || await TasksService.get(taskId);
      if (!task) return;
      const flowStatuses = ['pending','in_progress','submitted','under_review','completed'];
      const flowLabels   = ['Pending','In Progress','Submitted','Under Review','Completed'];
      const currentIdx   = flowStatuses.indexOf(task.status);
      document.getElementById('task-detail-content').innerHTML = `
        <div class="modal-header">
          <h2 class="modal-title">${task.title}</h2>
          <button class="modal-close" onclick="Modal.close('task-detail-modal')"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:18px;height:18px"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.5rem;margin-bottom:1rem;font-size:0.82rem">
          <div style="color:var(--text-muted)">Status</div><div>${statusBadge(task.status)}</div>
          <div style="color:var(--text-muted)">Priority</div><div>${priorityBadge(task.priority)}</div>
          <div style="color:var(--text-muted)">Deadline</div><div>${formatDate(task.deadline)} ${deadlineBadge(task.deadline)}</div>
          <div style="color:var(--text-muted)">Created</div><div style="color:var(--text-secondary)">${formatDate(task.createdAt)}</div>
          ${task.completedAt ? `<div style="color:var(--text-muted)">Completed</div><div style="color:var(--status-completed)">${formatDate(task.completedAt)}</div>` : ''}
        </div>
        <div style="margin-bottom:1rem">
          <div style="font-size:0.75rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:0.6rem">Workflow Progress</div>
          <div class="task-status-flow">
            ${flowStatuses.map((s,i) => `
              <div class="flow-step">
                <div style="display:flex;flex-direction:column;align-items:center">
                  <div class="flow-dot ${i<currentIdx?'done':i===currentIdx?'active':''}"></div>
                  <div class="flow-label">${flowLabels[i]}</div>
                </div>
                ${i<flowStatuses.length-1?`<div class="flow-line ${i<currentIdx?'done':''}"></div>`:''}
              </div>
            `).join('')}
          </div>
        </div>
        ${task.description ? `<div style="margin-bottom:1rem"><div style="font-size:0.75rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:0.4rem">Description</div><div style="font-size:0.83rem;color:var(--text-secondary);line-height:1.5">${task.description}</div></div>` : ''}
        ${task.progressNote ? `<div style="background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:0.85rem;margin-bottom:1rem"><div style="font-size:0.72rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:4px">Your Progress Note</div><div style="font-size:0.83rem;color:var(--text-primary)">${task.progressNote}</div></div>` : ''}
        <div>
          <div style="font-size:0.75rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:0.75rem">Admin Feedback</div>
          <div class="comment-list" id="detail-comments"><div class="spinner" style="margin:1rem auto"></div></div>
        </div>
      `;
      Modal.open('task-detail-modal');
      CommentsService.onComments(taskId, comments => {
        const el = document.getElementById('detail-comments');
        if (!el) return;
        if (!comments.length) { el.innerHTML = `<div style="font-size:0.8rem;color:var(--text-muted);text-align:center;padding:0.75rem">No feedback yet from admin.</div>`; return; }
        el.innerHTML = comments.map(c => `
          <div class="comment-item">
            <div class="avatar avatar-sm">${getInitials(c.authorName||'A')}</div>
            <div class="comment-bubble">
              <div class="comment-meta">
                <span class="comment-author">${c.authorName||'—'}</span>
                <span class="comment-time">${timeAgo(c.createdAt)}</span>
              </div>
              <div class="comment-text">${c.text}</div>
            </div>
          </div>
        `).join('');
      });
    }

    init();
  </script>
</body>
</html>
